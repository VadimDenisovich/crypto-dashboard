# Production-ish compose: ожидает, что Postgres и Redis уже подняты на сервере
# (в /docker) и доступны через внешнюю docker-сеть либо по доменам/IP.
# Для локалки используйте docker-compose.dev.yml как override:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  migrate:
    image: ${BACKEND_IMAGE:-ghcr.io/vadimdenisovich/crypto-dashboard-backend:latest}
    container_name: crypto-migrate
    command: ["alembic", "upgrade", "head"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      BACKEND_DATABASE_URL: ${BACKEND_DATABASE_URL}
      BACKEND_REDIS_URL: ${BACKEND_REDIS_URL}
      BACKEND_JWT_SECRET: ${BACKEND_JWT_SECRET}
      BACKEND_ENCRYPTION_KEY: ${BACKEND_ENCRYPTION_KEY}
    restart: "no"

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/vadimdenisovich/crypto-dashboard-backend:latest}
    container_name: crypto-backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - public
    environment:
      BACKEND_DATABASE_URL: ${BACKEND_DATABASE_URL}
      BACKEND_REDIS_URL: ${BACKEND_REDIS_URL}
      BACKEND_JWT_SECRET: ${BACKEND_JWT_SECRET}
      BACKEND_ENCRYPTION_KEY: ${BACKEND_ENCRYPTION_KEY}
      BACKEND_ACCESS_TOKEN_TTL_MIN: ${BACKEND_ACCESS_TOKEN_TTL_MIN:-15}
      BACKEND_REFRESH_TOKEN_TTL_DAYS: ${BACKEND_REFRESH_TOKEN_TTL_DAYS:-7}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      BACKEND_LOG_LEVEL: ${BACKEND_LOG_LEVEL:-INFO}
      # === Phase 2: identity providers ===
      BACKEND_FRONTEND_URL: ${BACKEND_FRONTEND_URL}
      BACKEND_CAPTCHA_DISABLED: ${BACKEND_CAPTCHA_DISABLED:-false}
      HCAPTCHA_SECRET: ${HCAPTCHA_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_SENDER_EMAIL: ${RESEND_SENDER_EMAIL}
      RESEND_SENDER_NAME: ${RESEND_SENDER_NAME:-Crypto Dashboard}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET}
      YANDEX_REDIRECT_URI: ${YANDEX_REDIRECT_URI}
      GH_CLIENT_ID: ${GH_CLIENT_ID}
      GH_CLIENT_SECRET: ${GH_CLIENT_SECRET}
      GH_REDIRECT_URI: ${GH_REDIRECT_URI}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/vadimdenisovich/crypto-dashboard-frontend:latest}
    container_name: crypto-frontend
    networks:
      - default
      - public
    ports:
      - "127.0.0.1:5173:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      - backend
    restart: unless-stopped

  engine:
    image: ${ENGINE_IMAGE:-ghcr.io/vadimdenisovich/crypto-trade-engine:latest}
    container_name: crypto-engine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ENGINE_DATABASE_URL: ${ENGINE_DATABASE_URL:-${BACKEND_DATABASE_URL}}
      ENGINE_REDIS_URL: ${ENGINE_REDIS_URL:-${BACKEND_REDIS_URL}}
      ENGINE_ENCRYPTION_KEY: ${ENGINE_ENCRYPTION_KEY:-${BACKEND_ENCRYPTION_KEY}}
      ENGINE_LOG_LEVEL: ${ENGINE_LOG_LEVEL:-INFO}
      ENGINE_HEARTBEAT_INTERVAL_SEC: ${ENGINE_HEARTBEAT_INTERVAL_SEC:-10}
      ENGINE_BALANCE_POLL_INTERVAL_SEC: ${ENGINE_BALANCE_POLL_INTERVAL_SEC:-15}
      ENGINE_STATE_SNAPSHOT_TTL_SEC: ${ENGINE_STATE_SNAPSHOT_TTL_SEC:-30}
      ENGINE_COMMAND_DEDUP_TTL_SEC: ${ENGINE_COMMAND_DEDUP_TTL_SEC:-86400}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

# По умолчанию контейнеры в одной сети compose'а. На сервере подключите
# постгрес/редис через external-сеть (раскомментируйте блок ниже и пропишите
# фактическое имя сети, например имя проекта compose'а для postgres):
#
# networks:
#   default:
#     name: crypto-infra
#     external: true

networks:
  public:
    name: nginx_network
    external: true
