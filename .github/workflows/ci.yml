name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ci -d ci_db"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 3s --health-retries 5
    env:
      BACKEND_DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/ci_db
      BACKEND_REDIS_URL: redis://localhost:6379/0
      BACKEND_JWT_SECRET: ci-secret-not-for-prod
      BACKEND_ENCRYPTION_KEY: ZmRldi1mZXJuZXQta2V5LXBsZWFzZS1jaGFuZ2UtaW4tcHJvZD0=
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run alembic migrations
        working-directory: backend
        run: alembic upgrade head
      - name: Run tests
        working-directory: backend
        run: pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000/api/
          VITE_WS_URL: ws://localhost:8000/ws/updates
        run: pnpm build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: crypto-dashboard-backend:ci
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: crypto-dashboard-frontend:ci
