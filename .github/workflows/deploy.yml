name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      backend_tag: ${{ steps.meta.outputs.backend_tag }}
      frontend_tag: ${{ steps.meta.outputs.frontend_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tags (lowercase)
        id: meta
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "backend_tag=ghcr.io/${OWNER_LC}/crypto-dashboard-backend:${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "frontend_tag=ghcr.io/${OWNER_LC}/crypto-dashboard-frontend:${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "backend_latest=ghcr.io/${OWNER_LC}/crypto-dashboard-backend:latest" >> $GITHUB_OUTPUT
          echo "frontend_latest=ghcr.io/${OWNER_LC}/crypto-dashboard-frontend:latest" >> $GITHUB_OUTPUT
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_tag }}
            ${{ steps.meta.outputs.backend_latest }}
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_tag }}
            ${{ steps.meta.outputs.frontend_latest }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_REPOSITORY: ${{ github.repository }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH,DEPLOY_REPOSITORY
          script: |
            set -euo pipefail
            DEPLOY_PATH="$(printf '%s' "$DEPLOY_PATH" | tr -d '\r\n')"
            DEPLOY_REPOSITORY="$(printf '%s' "$DEPLOY_REPOSITORY" | tr -d '\r\n')"
            if [ -z "$DEPLOY_PATH" ]; then
              echo "DEPLOY_PATH is empty"
              exit 1
            fi
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              mkdir -p "$DEPLOY_PATH"
              git clone --recurse-submodules "https://github.com/$DEPLOY_REPOSITORY.git" "$DEPLOY_PATH"
            fi
            cd "$DEPLOY_PATH"
            if [ ! -f .env ]; then
              echo "Missing $DEPLOY_PATH/.env"
              exit 1
            fi
            git fetch --recurse-submodules origin main
            git checkout main
            git reset --hard origin/main
            git submodule update --init --recursive
            docker compose pull
            docker compose run --rm migrate
            docker compose up -d --remove-orphans
            docker image prune -f
