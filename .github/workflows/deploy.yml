name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      backend_tag: ${{ steps.meta.outputs.backend_tag }}
      frontend_tag: ${{ steps.meta.outputs.frontend_tag }}
      engine_tag: ${{ steps.meta.outputs.engine_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tags (lowercase)
        id: meta
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "backend_tag=ghcr.io/${OWNER_LC}/crypto-dashboard-backend:${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "frontend_tag=ghcr.io/${OWNER_LC}/crypto-dashboard-frontend:${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "engine_tag=ghcr.io/${OWNER_LC}/crypto-trade-engine:${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "backend_latest=ghcr.io/${OWNER_LC}/crypto-dashboard-backend:latest" >> $GITHUB_OUTPUT
          echo "frontend_latest=ghcr.io/${OWNER_LC}/crypto-dashboard-frontend:latest" >> $GITHUB_OUTPUT
          echo "engine_latest=ghcr.io/${OWNER_LC}/crypto-trade-engine:latest" >> $GITHUB_OUTPUT
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_tag }}
            ${{ steps.meta.outputs.backend_latest }}
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          # Vite вшивает VITE_* на этапе билда — пробрасываем через build args.
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_WS_URL=${{ secrets.VITE_WS_URL }}
            VITE_HCAPTCHA_SITEKEY=${{ secrets.HCAPTCHA_SITEKEY }}
          tags: |
            ${{ steps.meta.outputs.frontend_tag }}
            ${{ steps.meta.outputs.frontend_latest }}
      - name: Build & push engine
        uses: docker/build-push-action@v6
        with:
          context: ./trade-engine-crypto
          push: true
          tags: |
            ${{ steps.meta.outputs.engine_tag }}
            ${{ steps.meta.outputs.engine_latest }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_REPOSITORY: ${{ github.repository }}
          BACKEND_DATABASE_URL: ${{ secrets.BACKEND_DATABASE_URL }}
          BACKEND_REDIS_URL: ${{ secrets.BACKEND_REDIS_URL }}
          BACKEND_JWT_SECRET: ${{ secrets.BACKEND_JWT_SECRET }}
          BACKEND_ENCRYPTION_KEY: ${{ secrets.BACKEND_ENCRYPTION_KEY }}
          BACKEND_CORS_ORIGINS: ${{ secrets.BACKEND_CORS_ORIGINS }}
          BACKEND_LOG_LEVEL: ${{ secrets.BACKEND_LOG_LEVEL }}
          BACKEND_FRONTEND_URL: ${{ secrets.BACKEND_FRONTEND_URL }}
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend_tag }}
          FRONTEND_IMAGE: ${{ needs.build-and-push.outputs.frontend_tag }}
          ENGINE_IMAGE: ${{ needs.build-and-push.outputs.engine_tag }}
          # === Phase 2: Identity providers ===
          HCAPTCHA_SECRET: ${{ secrets.HCAPTCHA_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_SENDER_EMAIL: ${{ secrets.RESEND_SENDER_EMAIL }}
          RESEND_SENDER_NAME: ${{ secrets.RESEND_SENDER_NAME }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          YANDEX_CLIENT_ID: ${{ secrets.YANDEX_CLIENT_ID }}
          YANDEX_CLIENT_SECRET: ${{ secrets.YANDEX_CLIENT_SECRET }}
          YANDEX_REDIRECT_URI: ${{ secrets.YANDEX_REDIRECT_URI }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          GH_REDIRECT_URI: ${{ secrets.GH_REDIRECT_URI }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BOT_USERNAME: ${{ secrets.TELEGRAM_BOT_USERNAME }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH,DEPLOY_REPOSITORY,BACKEND_DATABASE_URL,BACKEND_REDIS_URL,BACKEND_JWT_SECRET,BACKEND_ENCRYPTION_KEY,BACKEND_CORS_ORIGINS,BACKEND_LOG_LEVEL,BACKEND_FRONTEND_URL,BACKEND_IMAGE,FRONTEND_IMAGE,ENGINE_IMAGE,HCAPTCHA_SECRET,RESEND_API_KEY,RESEND_SENDER_EMAIL,RESEND_SENDER_NAME,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_REDIRECT_URI,YANDEX_CLIENT_ID,YANDEX_CLIENT_SECRET,YANDEX_REDIRECT_URI,GH_CLIENT_ID,GH_CLIENT_SECRET,GH_REDIRECT_URI,TELEGRAM_BOT_TOKEN,TELEGRAM_BOT_USERNAME
          script: |
            set -euo pipefail
            DEPLOY_PATH="$(printf '%s' "$DEPLOY_PATH" | tr -d '\r\n')"
            DEPLOY_REPOSITORY="$(printf '%s' "$DEPLOY_REPOSITORY" | tr -d '\r\n')"
            if [ -z "$DEPLOY_PATH" ]; then
              echo "DEPLOY_PATH is empty"
              exit 1
            fi
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              mkdir -p "$DEPLOY_PATH"
              git clone --recurse-submodules "https://github.com/$DEPLOY_REPOSITORY.git" "$DEPLOY_PATH"
            fi
            cd "$DEPLOY_PATH"
            : "${BACKEND_DATABASE_URL:?BACKEND_DATABASE_URL is empty}"
            : "${BACKEND_REDIS_URL:?BACKEND_REDIS_URL is empty}"
            : "${BACKEND_JWT_SECRET:?BACKEND_JWT_SECRET is empty}"
            : "${BACKEND_ENCRYPTION_KEY:?BACKEND_ENCRYPTION_KEY is empty}"
            : "${BACKEND_CORS_ORIGINS:?BACKEND_CORS_ORIGINS is empty}"
            : "${BACKEND_FRONTEND_URL:?BACKEND_FRONTEND_URL is empty}"
            : "${BACKEND_IMAGE:?BACKEND_IMAGE is empty}"
            : "${FRONTEND_IMAGE:?FRONTEND_IMAGE is empty}"
            : "${ENGINE_IMAGE:?ENGINE_IMAGE is empty}"
            case "$BACKEND_DATABASE_URL" in
              postgresql+asyncpg://*) ;;
              *)
                echo "BACKEND_DATABASE_URL must start with postgresql+asyncpg://"
                exit 1
                ;;
            esac
            case "$BACKEND_DATABASE_URL" in
              *://USER:*|*:PASSWORD@*|*/DBNAME|*/DBNAME\?*)
                echo "BACKEND_DATABASE_URL still contains placeholder values: USER, PASSWORD, or DBNAME"
                exit 1
                ;;
            esac
            case "$BACKEND_REDIS_URL" in
              redis://*|rediss://*) ;;
              *)
                echo "BACKEND_REDIS_URL must start with redis:// or rediss://"
                exit 1
                ;;
            esac
            BACKEND_LOG_LEVEL="${BACKEND_LOG_LEVEL:-INFO}"
            RESEND_SENDER_NAME="${RESEND_SENDER_NAME:-Crypto Dashboard}"
            umask 077
            # Движок шарит БД, Redis и Fernet-ключ с бэком. Bal Phase 2 добавлены
            # OAuth/Resend/hCaptcha переменные — они нужны только бэку.
            cat > .env <<EOF
            BACKEND_DATABASE_URL=$BACKEND_DATABASE_URL
            BACKEND_REDIS_URL=$BACKEND_REDIS_URL
            BACKEND_JWT_SECRET=$BACKEND_JWT_SECRET
            BACKEND_ENCRYPTION_KEY=$BACKEND_ENCRYPTION_KEY
            BACKEND_CORS_ORIGINS=$BACKEND_CORS_ORIGINS
            BACKEND_LOG_LEVEL=$BACKEND_LOG_LEVEL
            BACKEND_FRONTEND_URL=$BACKEND_FRONTEND_URL
            BACKEND_IMAGE=$BACKEND_IMAGE
            FRONTEND_IMAGE=$FRONTEND_IMAGE
            ENGINE_IMAGE=$ENGINE_IMAGE
            ENGINE_DATABASE_URL=$BACKEND_DATABASE_URL
            ENGINE_REDIS_URL=$BACKEND_REDIS_URL
            ENGINE_ENCRYPTION_KEY=$BACKEND_ENCRYPTION_KEY
            ENGINE_LOG_LEVEL=$BACKEND_LOG_LEVEL
            HCAPTCHA_SECRET=$HCAPTCHA_SECRET
            RESEND_API_KEY=$RESEND_API_KEY
            RESEND_SENDER_EMAIL=$RESEND_SENDER_EMAIL
            RESEND_SENDER_NAME=$RESEND_SENDER_NAME
            GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
            GOOGLE_REDIRECT_URI=$GOOGLE_REDIRECT_URI
            YANDEX_CLIENT_ID=$YANDEX_CLIENT_ID
            YANDEX_CLIENT_SECRET=$YANDEX_CLIENT_SECRET
            YANDEX_REDIRECT_URI=$YANDEX_REDIRECT_URI
            GH_CLIENT_ID=$GH_CLIENT_ID
            GH_CLIENT_SECRET=$GH_CLIENT_SECRET
            GH_REDIRECT_URI=$GH_REDIRECT_URI
            TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
            TELEGRAM_BOT_USERNAME=$TELEGRAM_BOT_USERNAME
            EOF
            git fetch --recurse-submodules origin main
            git checkout main
            git reset --hard origin/main
            git submodule update --init --recursive
            docker compose pull
            docker compose run --rm migrate
            docker compose up -d --remove-orphans
            docker exec nginx nginx -s reload || true
            docker image prune -f
