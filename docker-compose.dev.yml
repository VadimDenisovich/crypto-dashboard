# Локальный override: добавляет postgres + redis, переключает backend/frontend
# на сборку из исходников с hot-reload.
# Запуск:
#   cp .env.example .env  # и заполни локально
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  postgres:
    image: postgres:18.3
    container_name: crypto-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: crypto-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  migrate:
    image: !reset null
    build:
      context: ./backend
    command: ["alembic", "upgrade", "head"]
    environment:
      BACKEND_DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      BACKEND_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    image: !reset null
    build:
      context: ./backend
    environment:
      BACKEND_DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      BACKEND_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  frontend:
    image: !reset null
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000/ws/updates}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["pnpm", "dev", "--host", "0.0.0.0"]
    ports:
      - "5173:5173"
    stdin_open: true

volumes:
  postgres_data:
  redis_data:
